<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <header class="hero">
            <h1>Мои заметки</h1>
            <div class="heroButtons" id="heroButtons">
                <button class="createNoteButton">Создать заметку</button>
                <button>Удалить все заметки</button>
            </div>
        </header>
        <div id="createNoteForm" class="createNoteForm">
            <div class="content">
                <span id="closeBtn">&times;</span>
                <h2>Создание заметки</h2>
                <input id="headerInput" type="text" placeholder="Название">
                <input id="textInput" type="text" placeholder="Текст">
                <button id="createNewNoteBtn">Создать заметку</button>
            </div>
        </div>
        <section class="empty" id="empty">
                <h2>У вас пока нет заметок.</h2>
                <button class="createNoteButton">Создать первую заметку</button>
            </section>
        <section class="notes" id="notesContainer"></section>
        <!-- <div class="note">
            <h2>Название заметки</h3>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Unde, nemo, quisquam adipisci nulla error, a omnis hic ab consequuntur eos nobis obcaecati praesentium odit illo. Neque modi sit esse similique alias atque quaerat error veniam ab! Provident culpa iste sapiente doloribus! Quaerat voluptates quo earum quis, cum possimus exercitationem aspernatur.</p>
            <button class="removeNote">Удалить заметку</button>
        </div> -->
    </main>

    <script src="script.js"></script>
</body>
</html>
